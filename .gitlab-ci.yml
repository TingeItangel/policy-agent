stages:
  - build

build-and-push:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  tags:
    - kaniko
  variables:
    DOCKER_IMAGE: "cmvek/policy-agent"
  script:
    # Docker-Config für Kaniko bauen – mit username/password statt base64-auth
    - mkdir -p /kaniko/.docker
    - |
      cat > /kaniko/.docker/config.json <<EOF
      {
        "auths": {
          "https://index.docker.io/v1/": {
            "username": "$DOCKERHUB_USERNAME",
            "password": "$DOCKERHUB_TOKEN"
          }
        }
      }
      EOF

    # Zur Kontrolle (Passwort maskieren)
    - >
      sed 's/"password": *"[^"]*"/"password": "***"/' /kaniko/.docker/config.json

    # Image bauen und pushen
    - >
      /kaniko/executor
      --context "$CI_PROJECT_DIR"
      --dockerfile "$CI_PROJECT_DIR/Dockerfile"
      --destination "docker.io/$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA"
      --destination "docker.io/$DOCKER_IMAGE:latest"
      --cleanup

  only:
    - master
