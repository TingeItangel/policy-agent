stages:
  - build

build-and-push:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  tags:
    - kaniko
  variables:
    # Name des DockerHub-Images:
    DOCKER_IMAGE: "cmvek/policy-agent"
  script:
    # DockerHub Login für Kaniko
    - mkdir -p /kaniko/.docker
    - >
      echo "{\"auths\":{\"https://index.docker.io/v1/\":
      {\"auth\":\"$(printf '%s:%s' \"$DOCKERHUB_USERNAME\" \"$DOCKERHUB_PASSWORD\" | base64 | tr -d '\n')\"}}}"
      > /kaniko/.docker/config.json

    # Image bauen und pushen
    - >
      /kaniko/executor
      --context "$CI_PROJECT_DIR"
      --dockerfile "$CI_PROJECT_DIR/Dockerfile"
      --destination "docker.io/$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA"
      --destination "docker.io/$DOCKER_IMAGE:latest"
      --cleanup

  only:
    - main
