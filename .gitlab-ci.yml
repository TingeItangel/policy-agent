stages:
  - build

build-and-push:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  tags:
    - kaniko
  variables:
    # Name des DockerHub-Images:
    DOCKER_IMAGE: "cmvek/policy-agent"
  script:
    - echo "DOCKERHUB_USERNAME length:"
    - 'printf "%s" "$DOCKERHUB_USERNAME" | wc -c'
    - echo "DOCKERHUB_TOKEN length:"
    - 'printf "%s" "$DOCKERHUB_TOKEN" | wc -c'

    - mkdir -p /kaniko/.docker
    - >
      echo "{\"auths\":{\"https://index.docker.io/v1/\":
      {\"auth\":\"$(printf '%s:%s' \"$DOCKERHUB_USERNAME\" \"$DOCKERHUB_TOKEN\" | base64 | tr -d '\n')\"}}}"
      > /kaniko/.docker/config.json

    - cat /kaniko/.docker/config.json | sed 's/\"auth\":\"[^\"]*\"/\"auth\":\"***\"/'
    - >
      /kaniko/executor
      --context "$CI_PROJECT_DIR"
      --dockerfile "$CI_PROJECT_DIR/Dockerfile"
      --destination "docker.io/$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA"
      --destination "docker.io/$DOCKER_IMAGE:latest"
      --cleanup


  only:
    - master
