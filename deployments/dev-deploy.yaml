apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-agent
  namespace: policy-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: policy-agent
  template:
    metadata:
      labels:
        app: policy-agent
    spec:
      serviceAccountName: policy-agent-sa
      containers:
        - name: agent
          image: policy-agent-dev
          imagePullPolicy: Never
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

            - name: DEBUG_SKIP_MR_CONFIG_ID_FETCH
              value: "1" # Set to "1" to skip fetching mr_config_id for debugging

            - name: REDIS_ADDR
              value: "redis:6379"

            - name: KBS_NAMESPACE
              value: "operators"

            - name: KBS_CONFIG_NAME
              value: "kbsconfig-sample"

            - name: REMOTE_API_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: remote-cluster-cred
                  key: api-server-url

            - name: REMOTE_TOKEN_FILE
              value: "/var/run/remote-cluster/token"
            - name: REMOTE_CA_FILE
              value: "/var/run/remote-cluster/ca.crt"

          ports:
            - containerPort: 8443

          volumeMounts:
            - name: remote-cluster-cred
              mountPath: /var/run/remote-cluster
              readOnly: true

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "2Gi"

      volumes:
        - name: remote-cluster-cred
          secret:
            secretName: remote-cluster-cred
---
apiVersion: v1
kind: Service
metadata:
  name: policy-agent
  namespace: policy-agent
spec:
  type: LoadBalancer
  selector:
    app: policy-agent
  ports:
    - name: https
      port: 443 # External-Port
      targetPort: 8443 # Container-Port (Go-HTTPS-Server)
