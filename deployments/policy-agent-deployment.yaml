# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          ports:
            - containerPort: 6379
          args: ["--appendonly", "yes"]
---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
# Policy Agent Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-agent
  labels:
    app: policy-agent
spec:
  selector:
    matchLabels:
      app: policy-agent
  template:
    metadata:
      labels:
        app: policy-agent
    spec:
      containers:
        - name: policy-agent
          image: myregistry/policy-agent:latest
          ports:
            - containerPort: 8443
          env:
            - name: REDIS_HOST
              value: "redis:6379" # connects to Redis service
---
# Policy Agent Service
apiVersion: v1
kind: Service
metadata:
  name: policy-agent
  labels:
    app: policy-agent
spec:
  selector:
    app: policy-agent
  ports:
    - name: https
      port: 8443
      targetPort: 8443
