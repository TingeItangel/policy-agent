# rbac-policy-agent.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: policy-agent-sa
  namespace: policy-agent
---
# PolicyAgent Role to read its own ServiceAccount info
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: policy-agent-self-read
  namespace: policy-agent
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: policy-agent-self-read-binding
  namespace: policy-agent
subjects:
  - kind: ServiceAccount
    name: policy-agent-sa
    namespace: policy-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: policy-agent-self-read
---
# Role to allow PolicyAgent to edit KBSConfig resources in 'operators' namespace
# This is needed to update the KBSConfig with new secrets.
# Note: Adjust <namespace> if KBSConfig is in a different namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kbsconfig-editor
  namespace: operators
rules:
  - apiGroups: ["confidentialcontainers.org"] # << richtige API-Group
    resources: ["kbsconfigs"] # << richtige Resource (Plural)
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kbsconfig-editor-binding
  namespace: operators
subjects:
  - kind: ServiceAccount
    name: policy-agent-sa
    namespace: policy-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kbsconfig-editor
---
# Role to allow PolicyAgent to manage Secrets in 'operators' namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-manager
  namespace: operators
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-manager-binding
  namespace: operators
subjects:
  - kind: ServiceAccount
    name: policy-agent-sa
    namespace: policy-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: secret-manager
---
# Role to allow PolicyAgent to update ConfigMap 'rvps-reference-values' in 'operators' namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rvps-configmap-editor
  namespace: operators
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["rvps-reference-values"] # optional: least privilege
    verbs: ["get", "update", "patch"] # evtl. "list" wenn du mehrere lesen willst
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rvps-configmap-editor-binding
  namespace: operators
subjects:
  - kind: ServiceAccount
    name: policy-agent-sa
    namespace: policy-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rvps-configmap-editor
---
# Role to allow PolicyAgent to watch Deployments across all namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: patcher-role
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: patcher-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: policy-agent-sa
    namespace: policy-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: patcher-role
---
###############################################
# TODO: REMOVE LATER AND DEPLOY ON REMOTE CLUSTER
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-editor
  namespace: policy-agent
rules:
  # Basic pod operations in default namespace
  - apiGroups: [""]
    resources: ["pods"]
    verbs:
      ["get", "list", "watch", "create", "update", "patch", "delete", "exec"]

  - apiGroups: [""]
    resources: ["pods/exec", "pods/log"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-editor-binding
  namespace: policy-agent
subjects:
  - kind: ServiceAccount
    name: policy-agent-sa
    namespace: policy-agent # <- dein SA-Namespace
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pod-editor
