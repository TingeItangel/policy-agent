# Service Account and RBAC for policy-agent in untrusted cluster
apiVersion: v1
kind: ServiceAccount
metadata:
  name: policy-agent-sa
  namespace: default
---
# Role to read and patch Deployments in target namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default # or target namespace
  name: patcher-role
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: patcher-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: policy-agent-sa
    namespace: default
roleRef:
  kind: Role
  name: patcher-role
  apiGroup: rbac.authorization.k8s.io
---
# Role to read and exec Pods in target namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: default # Ziel-Namespace!
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "exec"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-reader-binding
  namespace: default # Ziel-Namespace!
subjects:
  - kind: ServiceAccount
    name: policy-agent-sa
    namespace: default
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: pod-reader
