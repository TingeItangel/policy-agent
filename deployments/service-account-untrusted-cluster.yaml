apiVersion: v1
kind: ServiceAccount
metadata:
  name: policy-agent
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default # or target namespace
  name: patcher-role
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: patcher-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: policy-agent
    namespace: kube-system
roleRef:
  kind: Role
  name: patcher-role
  apiGroup: rbac.authorization.k8s.io
