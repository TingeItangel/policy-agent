apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-agent
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: policy-agent
  template:
    metadata:
      labels:
        app: policy-agent
    spec:
      containers:
        - name: policy-agent
          image: myregistry/policy-agent:latest
          ports:
            - containerPort: 8443
          env:
            - name: REDIS_HOST
              value: "redis:6379"   # points to Redis service inside cluster
